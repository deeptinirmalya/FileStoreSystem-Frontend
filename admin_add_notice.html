<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Notice | Admin Management</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Configuration -->
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0b0f1a;
            --bg-card: #161c2d;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #2d3748;
            --sidebar-width: 280px;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background: #0f172a;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        /* Main Content */
        .main-container {
            flex-grow: 1;
            margin-left: var(--sidebar-width);
            padding: 2.5rem 3.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header i {
            background: rgba(99, 102, 241, 0.1);
            padding: 1rem;
            border-radius: 50%;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .form-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            color: var(--text-main);
            font-size: 0.9375rem;
            transition: all 0.2s;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 150px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .toast.error {
            background: var(--error);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }

        /* Loading */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo"><i data-lucide="shield-check" color="white" size="24"></i></div>
            <span class="brand-name">AdminHub</span>
        </div>
        <nav class="nav-menu">
            <li class="nav-item"><a href="admin_dashboard.html" class="nav-link"><i
                        data-lucide="layout-dashboard"></i><span>Analytics</span></a></li>
            <li class="nav-item"><a href="admin_add_user.html" class="nav-link"><i data-lucide="user-plus"></i><span>Add
                        User</span></a></li>
            <li class="nav-item"><a href="admin_files_stats.html" class="nav-link"><i
                        data-lucide="files"></i><span>Files</span></a></li>
            <li class="nav-item"><a href="admin_logs.html" class="nav-link"><i data-lucide="database"></i><span>System
                        Logs</span></a></li>
            <li class="nav-item"><a href="admin_add_file.html" class="nav-link"><i data-lucide="file-plus"></i><span>Add
                        File</span></a></li>
            <li class="nav-item"><a href="admin_add_notice.html" class="nav-link active"><i data-lucide="bell-plus"></i><span>Update Notice</span></a></li>
        </nav>
        <a class="nav-link" id="logoutBtn" style="color: #fca5a5; margin-top: auto; cursor: pointer;"><i
                data-lucide="log-out"></i><span>Sign Out</span></a>
    </aside>

    <main class="main-container">
        <div class="form-card">
            <div class="form-header">
                <i data-lucide="bell" size="32"></i>
                <h2>Update System Notice</h2>
                <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">Edit the global system notice</p>
            </div>

            <div id="loader" class="loader-container">
                <div class="loader"></div>
                <p style="color: var(--text-muted); margin-top: 1rem; font-size: 0.875rem;">Loading current notice...</p>
            </div>

            <form id="editNoticeForm" style="display: none;">
                <div class="form-group">
                    <label for="noticeMessage">Notice Message</label>
                    <textarea id="noticeMessage" class="form-control" placeholder="Type the notice message here..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i data-lucide="save" size="18"></i> Save Changes
                </button>
            </form>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i id="toastIcon" data-lucide="check-circle"></i>
        <span id="toastMessage">Success!</span>
    </div>

    <script>
        lucide.createIcons();
        
        // Token auth check
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = 'index.html';

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'index.html';
        });

        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');

        function showToast(message, isError = false) {
            toast.className = `toast ${isError ? 'error' : 'success'} show`;
            toastMessage.textContent = message;
            toastIcon.setAttribute('data-lucide', isError ? 'alert-circle' : 'check-circle');
            lucide.createIcons();
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Fetch existing notice
        async function loadNotice() {
            const loader = document.getElementById('loader');
            const form = document.getElementById('editNoticeForm');
            const textarea = document.getElementById('noticeMessage');

            try {
                const response = await fetch(`${CONFIG.BASE_URL}/admin/v1/admin-view-notice`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401 || response.status === 403) {
                    window.location.href = 'index.html';
                    return;
                }

                const data = await response.json();
                
                // Set text area value to current message if it exists
                if (data && data.message) {
                    textarea.value = data.message;
                } else {
                    textarea.value = '';
                }

            } catch (err) {
                console.error("View notice error:", err);
                showToast("Failed to fetch existing notice", true);
            } finally {
                loader.style.display = 'none';
                form.style.display = 'block';
            }
        }

        // Handle the notice edit submission
        document.getElementById('editNoticeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Saving...';
            btn.disabled = true;
            lucide.createIcons();

            const message = document.getElementById('noticeMessage').value.trim();
            
            try {
                const response = await fetch(`${CONFIG.BASE_URL}/admin/v1/admin-edit-notice`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast(data.msg || 'Notice saved successfully!');
                } else {
                    showToast(data.error || 'Failed to save notice.', true);
                }
            } catch (err) {
                console.error("Edit notice error:", err);
                showToast('Network error while saving notice.', true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        });

        // Init
        loadNotice();
    </script>
</body>

</html>
